<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميدو AI - نظام الكوينز</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --accent: #ea4335; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        
        /* التنسيقات */
        h2 { color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; font-size: 15px; }
        
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--secondary); color: white; }
        .btn-red { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #555; }
        
        /* الأقسام */
        #auth-section, #dashboard-section { display: none; }
        .card { background: #f1f3f4; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: right; }
        .balance-text { font-size: 24px; color: var(--secondary); font-weight: bold; text-align: center; }
        .uid-text { font-size: 11px; color: #777; word-break: break-all; background: #eee; padding: 5px; border-radius: 5px; }
        .status-msg { margin-top: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mopi - ميدو AI</h2>

    <div id="auth-section">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn-blue" id="loginBtn">تسجيل الدخول</button>
        <button class="btn-green" id="signupBtn">إنشاء حساب جديد</button>
        <hr>
        <button class="btn-red" id="googleBtn">الدخول بواسطة Google</button>
    </div>

    <div id="dashboard-section">
        <div class="card">
            <div class="balance-text">رصيدك: <span id="coinBalance">0</span> 🪙</div>
        </div>

        <div class="card">
            <strong>الـ ID الخاص بك (للاستلام):</strong>
            <div class="uid-text" id="myId">جاري التحميل...</div>
        </div>

        <button class="btn-green" id="earnBtn">إضغط هنا لربح 10 كوينز ⚡</button>

        <div class="card">
            <strong>إرسال كوينز لصديق:</strong>
            <input type="text" id="receiverId" placeholder="ضع الـ ID الخاص بصديقك هنا">
            <input type="number" id="sendAmount" placeholder="الكمية">
            <button class="btn-blue" id="sendBtn">إرسال الآن</button>
        </div>

        <button class="btn-outline" id="logoutBtn">تسجيل الخروج</button>
    </div>

    <div id="message" class="status-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    // إعدادات مشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyCfecAbSWaJfcXox7HBDKLjXdwpVyFnvEQ",
        authDomain: "mopi-5b11b.firebaseapp.com",
        projectId: "mopi-5b11b",
        storageBucket: "mopi-5b11b.firebasestorage.app",
        messagingSenderId: "1045999810663",
        appId: "1:1045999810663:web:ea56ddeed5cfec77453cc2",
        measurementId: "G-4PLBETDRVQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // عناصر الواجهة
    const authSection = document.getElementById('auth-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const messageDiv = document.getElementById('message');

    // مراقب حالة الدخول
    onAuthStateChanged(auth, (user) => {
        if (user) {
            authSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            document.getElementById('myId').innerText = user.uid;
            
            // تحديث الرصيد مباشرة عند التغيير في الداتا بيز
            const starCountRef = ref(db, 'users/' + user.uid + '/coins');
            onValue(starCountRef, (snapshot) => {
                const data = snapshot.val();
                document.getElementById('coinBalance').innerText = data || 0;
            });
        } else {
            authSection.style.display = 'block';
            dashboardSection.style.display = 'none';
        }
    });

    // 1. إنشاء حساب
    document.getElementById('signupBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, email, password)
            .then((res) => {
                // عند التسجيل لأول مرة، بنحط له 0 كوينز في الداتا بيز
                set(ref(db, 'users/' + res.user.uid), { coins: 0, email: email });
                notify("تم إنشاء الحساب!", "green");
            }).catch(err => notify(err.message, "red"));
    });

    // 2. تسجيل دخول
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, password)
            .then(() => notify("تم الدخول!", "green"))
            .catch(err => notify("خطأ في البيانات", "red"));
    });

    // 3. دخول بجوجل
    document.getElementById('googleBtn').addEventListener('click', () => {
        signInWithPopup(auth, googleProvider).then((res) => {
            // فحص إذا كان المستخدم جديد عشان نحط له 0 كوينز
            const userRef = ref(db, 'users/' + res.user.uid);
            get(userRef).then(snap => {
                if(!snap.exists()) set(userRef, { coins: 0, email: res.user.email });
            });
        }).catch(err => notify(err.message, "red"));
    });

    // 4. ربح الكوينز
    document.getElementById('earnBtn').addEventListener('click', () => {
        const user = auth.currentUser;
        if (user) {
            const coinRef = ref(db, 'users/' + user.uid + '/coins');
            runTransaction(coinRef, (current) => {
                return (current || 0) + 10;
            });
        }
    });

    // 5. تحويل الكوينز (العملية الأهم)
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const sender = auth.currentUser;
        const receiverId = document.getElementById('receiverId').value.trim();
        const amount = parseInt(document.getElementById('sendAmount').value);

        if (!receiverId || isNaN(amount) || amount <= 0) {
            notify("تأكد من البيانات!", "red");
            return;
        }

        if (receiverId === sender.uid) {
            notify("لا يمكنك الإرسال لنفسك!", "red");
            return;
        }

        const senderRef = ref(db, 'users/' + sender.uid + '/coins');
        const receiverRef = ref(db, 'users/' + receiverId + '/coins');

        const senderSnap = await get(senderRef);
        const currentBalance = senderSnap.val() || 0;

        if (currentBalance < amount) {
            notify("رصيدك غير كافٍ!", "red");
            return;
        }

        // فحص هل الـ ID التاني موجود أصلاً؟
        const receiverSnap = await get(ref(db, 'users/' + receiverId));
        if (!receiverSnap.exists()) {
            notify("الـ ID هذا غير موجود!", "red");
            return;
        }

        // تنفيذ عملية التحويل
        update(ref(db, 'users/' + sender.uid), { coins: currentBalance - amount });
        update(ref(db, 'users/' + receiverId), { coins: (receiverSnap.val().coins || 0) + amount });
        
        notify("تم إرسال " + amount + " كوينز بنجاح!", "green");
        document.getElementById('sendAmount').value = "";
        document.getElementById('receiverId').value = "";
    });

    // تسجيل خروج
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    function notify(msg, color) {
        messageDiv.innerText = msg;
        messageDiv.style.color = color;
    }
</script>
</body>
</html>
